owner: ServerDeveloper9447 # Your GitHub organization or username, where this repository lives
repo: statuspage # The name of this repository

sites:
  - name: Power Guilds Website
    url: https://powerguilds.foo.ng
  - name: Power Guilds Backend (node 1)
    url: $NODE1
  - name: Power Guilds Backend (node 2)
    url: $NODE2
  - name: Power Guilds Web Dashboard
    url: https://dash.powerguilds.foo.ng
  - name: Power Guilds Web Dashboard (Backend)
    url: https://internal.powerguilds.foo.ng
  - name: Power Guilds Backup Hosting (Should be up when both node 1 and node 2 are down)
    url: $BACKUP_HOSTING
  
status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  theme: dark
  baseUrl: /statuspage
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Power Guilds Status Page
  introTitle: "Statuspage for tracking uptime of **Power Guilds** services."
  introMessage: All updates will be posted alongside on your [Guilded Server](https://guilded.gg/powerguilds).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
